            <h2>景点简介</h2>
            <p>
                长城，又称万里长城，是中国古代的军事防御工程，以城墙为主体，结合关隘、烽燧等设施，绵延万里，气势磅礴。它始建于西周时期，秦代完成首次大规模修建，明代更是达到工程顶峰，现存的八达岭、慕田峪、司马台等段落，都是极具代表性的游览胜地。长城不仅是世界文化遗产，更是中华民族的象征，这里既能感受到历史的厚重，也能欣赏到四季各异的壮阔风光，是来中国必打卡的标志性景点。
            </p>
